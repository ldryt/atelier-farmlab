---
- name: Create directory for printer
  file:
    path: "{{ install_dir }}/printer_data_{{ item.0.name }}/{{ item.1 }}"
    state: directory
    mode: 0755
  loop: "{{ printers | product(['config', 'logs', 'comms']) | list }}"

- name: Create directory for gcodes
  file:
    path: "{{ install_dir }}/gcodes/{{ item.model }}"
    state: directory
    mode: 0755
  loop: "{{ printers }}"

- name: Ensure gcode path is not a directory
  file:
    path: "{{ install_dir }}/printer_data_{{ item.name }}/gcodes"
    state: absent
  loop: "{{ printers }}"

# https://github.com/Arksine/moonraker/blob/1ed102edfb34906115bfeb02712d4c839b93a7a9/moonraker/components/file_manager/file_manager.py#L158
- name: Symlink gcodes folder to moonraker expected path
  file:
    src: "{{ install_dir }}/gcodes/{{ item.model }}"
    dest: "{{ install_dir }}/printer_data_{{ item.name }}/gcodes"
    state: link
    force: yes
  loop: "{{ printers }}"

- name: Copy macros.cfg for printer
  template:
    src: macros.cfg.j2
    dest: "{{ install_dir }}/printer_data_{{ item.name }}/config/macros.cfg"
  loop: "{{ printers }}"
  notify: restart klipper

- name: Copy mainsail.cfg for printer
  template:
    src: mainsail.cfg.j2
    dest: "{{ install_dir }}/printer_data_{{ item.name }}/config/mainsail.cfg"
  loop: "{{ printers }}"
  notify: restart klipper

- name: Copy model.cfg for printer
  template:
    src: "{{ item.model }}.cfg.j2"
    dest: "{{ install_dir }}/printer_data_{{ item.name }}/config/{{ item.model }}.cfg"
  loop: "{{ printers }}"
  notify: restart klipper
  tags: ['klipper_cfg_printer']

- name: Copy name.cfg for printer
  template:
    src: "{{ item.name }}.cfg.j2"
    dest: "{{ install_dir }}/printer_data_{{ item.name }}/config/{{ item.name }}.cfg"
  loop: "{{ printers }}"
  notify: restart klipper
  tags: ['klipper_cfg_printer']

# TODO: transfer old SAVE_CONFIG to the new printer.cfg
- name: Create initial printer.cfg
  copy:
    dest: "{{ install_dir }}/printer_data_{{ item.name }}/config/printer.cfg"
    content: |
      [include mainsail.cfg]
      [include macros.cfg]

      [include {{ item.model }}.cfg]
      [include {{ item.name }}.cfg]

      [mcu]
      serial: /dev/{{ item.name }}

      ##########################################
      # WARNING
      # Here lies klipper's SAVE_CONFIG
      # You *NEED* to remove them and place the config overwrites in {{ item.model }}.cfg in git
      # The next Ansible deployment **WILL DISCARD THOSE CHANGES**
      ##########################################
  loop: "{{ printers }}"
