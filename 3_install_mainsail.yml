---
- name: Install mainsail
  hosts: farmlab
  tasks:
    - name: Create mainsail www folder
      become: yes
      file:
        path: /var/www/mainsail
        state: directory
        owner: pi
        group: www-data

    - name: Fetch mainsail git repository
      unarchive:
        src: https://github.com/mainsail-crew/mainsail/releases/download/v2.17.0/mainsail.zip
        dest: /var/www/mainsail
        remote_src: yes
        creates: /var/www/mainsail/index.html

    - name: Copy nginx common vars for mainsail
      become: yes
      template:
        src: templates/nginx_common_vars.conf.j2
        dest: /etc/nginx/conf.d/common_vars.conf
    
    - name: Copy nginx upstreams for mainsail
      become: yes
      template:
        src: templates/nginx_upstreams.conf.j2
        dest: /etc/nginx/conf.d/upstreams.conf
    
    - name: Copy nginx config for mainsail
      become: yes
      template:
        src: templates/nginx_mainsail.conf.j2
        dest: /etc/nginx/sites-available/mainsail

    - name: Remove nginx default site
      become: yes
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Link mainsail nginx config to enable sites
      become: yes
      file:
        src: /etc/nginx/sites-available/mainsail
        dest: /etc/nginx/sites-enabled/mainsail
        state: link
      notify: restart nginx

  handlers:
    - name: restart nginx
      become: yes
      systemd:
        name: nginx
        state: restarted
